name: Build BenVM Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget cpio unzip rsync bc \
          python3 libncurses-dev device-tree-compiler file sed make binutils \
          patch gzip bzip2 perl tar findutils bash gcc g++

    - name: Cache Buildroot downloads
      uses: actions/cache@v4
      with:
        path: buildroot/dl
        key: buildroot-dl-2025.02.10-v2
        restore-keys: |
          buildroot-dl-2025.02.10-

    - name: Clone Buildroot
      run: |
        if [ ! -f "buildroot/Makefile" ]; then
          rm -rf buildroot
          git clone --depth 1 --branch 2025.02.10 https://github.com/buildroot/buildroot.git
        fi

    - name: Apply BenVM configuration
      run: |
        cp configs/benvm_defconfig buildroot/configs/benvm_defconfig
        mkdir -p buildroot/board/benvm
        cp benvm_kernel.cfg buildroot/board/benvm/benvm_kernel.cfg
        cd buildroot
        make benvm_defconfig

    - name: Verify kernel headers config
      run: |
        cd buildroot
        echo "=== Available kernel headers options in this Buildroot ==="
        grep "config BR2_KERNEL_HEADERS" package/linux-headers/Config.in.host 2>/dev/null || \
        grep "config BR2_KERNEL_HEADERS" package/linux-headers/Config.in 2>/dev/null || \
        find . -name "Config.in*" -exec grep -l "KERNEL_HEADERS" {} \; 2>/dev/null | head -5
        echo ""

        echo "=== Kernel headers config after make defconfig ==="
        grep -i "KERNEL_HEADERS\|HEADERS_AT_LEAST\|HEADERS_VERSION" .config || echo "(no matches)"
        echo ""
        echo "=== BR2_LINUX_KERNEL settings ==="
        grep "BR2_LINUX_KERNEL" .config | head -10

        # If headers aren't set to 6.12 or AS_KERNEL, force it
        if ! grep -q "BR2_KERNEL_HEADERS_6_12=y" .config && \
           ! grep -q "BR2_KERNEL_HEADERS_AS_KERNEL=y" .config; then
          echo ""
          echo "WARN: Kernel headers not correctly set. Forcing fix..."
          # Comment out any existing headers selection
          sed -i 's/^BR2_KERNEL_HEADERS_[0-9].*=y/# &/' .config
          # Try AS_KERNEL first (depends on BR2_LINUX_KERNEL=y)
          if grep -q "BR2_LINUX_KERNEL=y" .config; then
            echo "BR2_KERNEL_HEADERS_AS_KERNEL=y" >> .config
          else
            echo "BR2_KERNEL_HEADERS_6_12=y" >> .config
          fi
          make olddefconfig
          echo ""
          echo "=== After fix ==="
          grep -i "KERNEL_HEADERS\|HEADERS_AT_LEAST" .config || echo "(no matches)"
        fi

    - name: Clean previous build
      run: |
        cd buildroot
        make clean

    - name: Build
      run: |
        cd buildroot
        make -j$(nproc)

    - name: Verify kernel configuration
      run: |
        echo "=== Verifying critical kernel config options ==="
        LINUX_DIR=$(ls -d buildroot/output/build/linux-*/ | head -1)
        CONFIG="${LINUX_DIR}/.config"

        # Verify expected kernel version
        KVER=$(basename "$LINUX_DIR" | sed 's/linux-//')
        echo "Kernel version: $KVER"
        if [[ "$KVER" != 6.12.* ]]; then
          echo "WARN: Expected 6.12.x kernel, got $KVER"
        else
          echo "OK: Kernel version $KVER (6.12 LTS)"
        fi

        FAIL=0

        # Check compressed instructions are DISABLED
        if grep -q "CONFIG_RISCV_ISA_C=y" "$CONFIG"; then
          echo "FATAL: CONFIG_RISCV_ISA_C=y — kernel has compressed instructions!"
          echo "BenVM does not implement the C extension. This WILL cause illegal instruction traps."
          FAIL=1
        else
          echo "OK: CONFIG_RISCV_ISA_C is not set (no compressed instructions)"
        fi

        # Check EFI is DISABLED
        if grep -q "CONFIG_EFI=y" "$CONFIG"; then
          echo "WARN: CONFIG_EFI=y — Image will have MZ header (BenVM can work around this)"
          # Not fatal since BenVM has MZ header workaround, but wasteful
        else
          echo "OK: CONFIG_EFI is not set (no MZ header)"
        fi

        # Check MMU is enabled
        if grep -q "CONFIG_MMU=y" "$CONFIG"; then
          echo "OK: CONFIG_MMU=y (Sv32 enabled)"
        else
          echo "FATAL: CONFIG_MMU not set — need Sv32 for Phase 2B!"
          FAIL=1
        fi

        # Check SBI console
        if grep -q "CONFIG_HVC_RISCV_SBI=y" "$CONFIG"; then
          echo "OK: CONFIG_HVC_RISCV_SBI=y (SBI console enabled)"
        else
          echo "FATAL: CONFIG_HVC_RISCV_SBI not set — no console output!"
          FAIL=1
        fi

        # Check STRICT_KERNEL_RWX is off
        if grep -q "CONFIG_STRICT_KERNEL_RWX=y" "$CONFIG"; then
          echo "WARN: CONFIG_STRICT_KERNEL_RWX=y — Image will be ~21MB with 4MB PMD gaps"
        else
          echo "OK: CONFIG_STRICT_KERNEL_RWX is not set (compact Image)"
        fi

        # Check LZ4 initramfs decompression support
        if grep -q "CONFIG_RD_LZ4=y" "$CONFIG"; then
          echo "OK: CONFIG_RD_LZ4=y (LZ4 initramfs decompression enabled)"
        else
          echo "WARN: CONFIG_RD_LZ4 not set — initramfs will use gzip (4x slower)"
        fi

        # Check for disabled subsystems (spot check)
        for OPT in CONFIG_PCI CONFIG_VIRTUALIZATION CONFIG_THERMAL CONFIG_IOMMU_SUPPORT CONFIG_DMA_ENGINE; do
          if grep -q "${OPT}=y" "$CONFIG"; then
            echo "WARN: ${OPT}=y — unnecessary subsystem still enabled"
          else
            echo "OK: ${OPT} disabled"
          fi
        done

        # Dump toolchain march for reference
        echo ""
        echo "=== Toolchain -march ==="
        buildroot/output/host/bin/riscv32-buildroot-linux-musl-gcc -v 2>&1 | grep "march" || true
        echo ""
        echo "=== Toolchain configured with ==="
        buildroot/output/host/bin/riscv32-buildroot-linux-musl-gcc -dumpmachine 2>&1 || true

        if [ $FAIL -ne 0 ]; then
          echo ""
          echo "BUILD VERIFICATION FAILED — kernel will not boot on BenVM"
          exit 1
        fi

    - name: Verify Image format
      run: |
        IMAGE="buildroot/output/images/Image"
        echo "=== Image file info ==="
        ls -la "$IMAGE"
        echo ""

        # Check for MZ header
        MAGIC=$(xxd -l 2 -p "$IMAGE")
        if [ "$MAGIC" = "4d5a" ]; then
          echo "WARN: Image has MZ header (PE/EFI stub present)"
          echo "BenVM MZ workaround will handle this, but CONFIG_EFI=n preferred"
        else
          echo "OK: No MZ header — clean entry point"
        fi

        # Check for RISCV magic at offset 0x30
        RISCV=$(xxd -s 0x30 -l 4 "$IMAGE" | awk '{print $2$3}')
        echo "RISCV magic at 0x30: $RISCV"

        # Quick content analysis
        python3 -c "
        data = open('$IMAGE', 'rb').read()
        zeros = data.count(b'\x00')
        print(f'Total: {len(data):,} bytes ({len(data)/1024/1024:.1f} MB)')
        print(f'Content: {len(data)-zeros:,} bytes ({100*(len(data)-zeros)/len(data):.0f}%)')
        print(f'Zeros: {zeros:,} bytes ({100*zeros/len(data):.0f}%)')
        "

        # Check first instruction for compressed encoding
        python3 -c "
        data = open('$IMAGE', 'rb').read()
        first_word = int.from_bytes(data[0:4], 'little')
        print(f'First 4 bytes: 0x{first_word:08x}')
        if data[0] == 0x4d and data[1] == 0x5a:
            print('  → MZ header detected (PE/EFI)')
            jal = int.from_bytes(data[2:6], 'little')
            print(f'  → JAL at offset 2: 0x{jal:08x}')
        elif first_word & 0x3 == 0x3:
            print(f'  → 32-bit instruction (opcode 0x{first_word & 0x7f:02x}) — good, no C extension')
        else:
            print(f'  → WARNING: compressed instruction detected at offset 0!')
        "

    - name: Compress kernel
      run: |
        gzip -k buildroot/output/images/Image

    - name: Analyse kernel size
      run: |
        LINUX_DIR=$(ls -d buildroot/output/build/linux-*/ | head -1)
        cd "$LINUX_DIR"
        CROSS="$PWD/../../host/bin/riscv32-buildroot-linux-musl"
        echo "=== vmlinux section sizes ==="
        ${CROSS}-size vmlinux || true
        echo ""
        echo "=== Top 20 largest symbols (BSS + data) ==="
        ${CROSS}-nm --size-sort -r vmlinux | head -40 || true

    - name: Upload kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: benvm-kernel-image
        path: |
          buildroot/output/images/Image
          buildroot/output/images/Image.gz
        retention-days: 90
