name: Build BenVM Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget cpio unzip rsync bc \
          python3 libncurses-dev device-tree-compiler file sed make binutils \
          patch gzip bzip2 perl tar findutils bash gcc g++

    - name: Cache Buildroot downloads
      uses: actions/cache@v4
      with:
        path: buildroot/dl
        key: buildroot-dl-2024.02.11-v1
        restore-keys: |
          buildroot-dl-2024.02.11-

    - name: Clone Buildroot
      run: |
        if [ ! -f "buildroot/Makefile" ]; then
          rm -rf buildroot
          git clone --depth 1 --branch 2024.02.11 https://github.com/buildroot/buildroot.git
        fi

    - name: Apply BenVM configuration
      run: |
        cp configs/benvm_defconfig buildroot/configs/benvm_defconfig
        mkdir -p buildroot/board/benvm
        cp benvm_kernel.cfg buildroot/board/benvm/benvm_kernel.cfg
        cd buildroot
        make benvm_defconfig

    - name: Clean previous build
      run: |
        cd buildroot
        make clean

    - name: Build
      run: |
        cd buildroot
        make -j$(nproc)

    - name: Analyse kernel size
      run: |
        cd buildroot/output/build/linux-*/
        echo "=== vmlinux section sizes ==="
        $PWD/../../host/bin/riscv32-buildroot-linux-musl-size vmlinux || size vmlinux || true
        echo ""
        echo "=== Top 20 largest symbols (BSS + data) ==="
        $PWD/../../host/bin/riscv32-buildroot-linux-musl-nm --size-sort -r vmlinux | head -40 || true
        echo ""
        echo "=== Subsystem breakdown ==="
        find . -name "built-in.a" -o -name "built-in.o" | head -20 | xargs $PWD/../../host/bin/riscv32-buildroot-linux-musl-size 2>/dev/null | sort -n -r -k 4 | head -15 || true

    - name: Upload kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: benvm-kernel-image
        path: buildroot/output/images/Image
        retention-days: 90
