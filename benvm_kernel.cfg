# ============================================================
# BenVM Kernel Configuration Fragment
# ============================================================
# Applied ON TOP of rv32_defconfig via Buildroot
#
# Target hardware:
#   - RV32IMA (no C, no F/D extensions)
#   - Sv32 MMU (2-level page tables, 4KB pages)
#   - Single hart (no SMP)
#   - SBI v0.1 console (BenVM built-in SBI, no OpenSBI)
#   - CLINT timer at 0x02000000
#   - 24MB RAM at 0x80000000
#   - No block devices (initramfs only for Phase 2B)
#
# Base kernel: Linux 6.12 LTS (rv32_defconfig)
# Buildroot: 2025.02.10 LTS
#
# v2: Performance-optimised — stripped all rv32_defconfig
#     subsystems that have no hardware in BenVM.
#     + LZ4 initramfs for ~4x faster decompression.
#     Upgraded from 6.6/Buildroot 2024.02 → 6.12/Buildroot 2025.02
# v3: Fix initramfs embedding compression (GZIP→LZ4).
#     Disable workqueue watchdog (false positives on slow emulator).
# ============================================================

# === Architecture ===
CONFIG_MMU=y
CONFIG_SMP=n
CONFIG_FPU=n

# === CRITICAL: No compressed instructions ===
# BenVM doesn't implement the C extension. The toolchain MUST also
# be built without RVC (BR2_RISCV_ISA_RVC not set in Buildroot defconfig).
CONFIG_RISCV_ISA_C=n
# CONFIG_RISCV_ISA_C is not set

# === CRITICAL: No EFI stub ===
# EFI adds an "MZ" PE header at offset 0 of the Image file.
# The MZ bytes (0x4D 0x5A) are a compressed instruction (c.li s4,-13)
# which BenVM can't execute. Disabling EFI removes the MZ header
# entirely — the Image starts directly with _start_kernel.
CONFIG_EFI=n
# CONFIG_EFI is not set

# === SBI Console ===
CONFIG_RISCV_SBI=y
CONFIG_RISCV_SBI_V01=y
CONFIG_HVC_DRIVER=y
CONFIG_HVC_RISCV_SBI=y
CONFIG_SERIAL_EARLYCON_RISCV_SBI=y

# === Initramfs ===
CONFIG_BLK_DEV_INITRD=y

# === LZ4 initramfs decompression ===
# LZ4 decompress is ~4x faster than gzip at CPU level.
# At 700K IPS, CPU time dominates over compressed size,
# so faster decompression wins decisively.
# Expected: ~1050s gzip → ~250-350s LZ4
CONFIG_RD_LZ4=y
CONFIG_DECOMPRESS_LZ4=y

# === LZ4 for initramfs EMBEDDING into kernel Image ===
# CONFIG_RD_LZ4 enables the kernel to *decompress* LZ4 at boot.
# CONFIG_INITRAMFS_COMPRESSION_LZ4 tells the kernel *build system*
# to compress the initramfs with LZ4 when embedding it into the Image.
# Without this, `make Image` runs GZIP on usr/initramfs_inc_data
# even when Buildroot produced an LZ4 cpio. Both are needed.
CONFIG_INITRAMFS_COMPRESSION_LZ4=y
# CONFIG_INITRAMFS_COMPRESSION_GZIP is not set

# === Size: Compiler ===
CONFIG_CC_OPTIMIZE_FOR_SIZE=y
CONFIG_DEBUG_INFO_NONE=y

# === Size: Disable networking (no VirtIO-net yet) ===
CONFIG_NET=n

# === Size: Disable block layer (no VirtIO-blk yet, initramfs only) ===
# NOTE: Re-enable for Phase 3A when VirtIO-blk lands
CONFIG_BLOCK=n

# === Size: No loadable modules ===
CONFIG_MODULES=n

# === Size: Small internal data structures ===
CONFIG_BASE_SMALL=1
CONFIG_LOG_BUF_SHIFT=12

# === Size: Strip debug/tracing ===
CONFIG_KALLSYMS=n
CONFIG_FTRACE=n
CONFIG_DEBUG_KERNEL=n
CONFIG_PROFILING=n
CONFIG_KPROBES=n
CONFIG_BPF_SYSCALL=n
CONFIG_PERF_EVENTS=n

# === Size: No crypto/security ===
CONFIG_CRYPTO=n
CONFIG_SECURITY=n
CONFIG_AUDIT=n

# === Size: No filesystems (initramfs provides rootfs) ===
CONFIG_EXT4_FS=n
CONFIG_EXT2_FS=n
CONFIG_XFS_FS=n
CONFIG_BTRFS_FS=n
CONFIG_VFAT_FS=n
CONFIG_MSDOS_FS=n
CONFIG_MISC_FILESYSTEMS=n
CONFIG_NETWORK_FILESYSTEMS=n
CONFIG_NFS_FS=n

# === Size: No unused subsystems (existing) ===
CONFIG_VGA_CONSOLE=n
CONFIG_SOUND=n
CONFIG_USB_SUPPORT=n
CONFIG_DRM=n
CONFIG_INPUT_MOUSE=n
CONFIG_INPUT_JOYSTICK=n
CONFIG_INPUT_TABLET=n
CONFIG_INPUT_TOUCHSCREEN=n
CONFIG_WLAN=n
CONFIG_WIRELESS=n
CONFIG_RFKILL=n
CONFIG_SWAP=n
CONFIG_SYSVIPC=n
CONFIG_POSIX_MQUEUE=n
CONFIG_CROSS_MEMORY_ATTACH=n
CONFIG_SECCOMP=n
CONFIG_STACKPROTECTOR=n
CONFIG_CGROUPS=n
CONFIG_COMPAT_BRK=n
CONFIG_USELIB=n

# === Size: Disable PMD-aligned section separation ===
# Without this, sections align to 4MB Sv32 PMD boundaries
# wasting ~15MB on a 24MB system
CONFIG_STRICT_KERNEL_RWX=n

# ============================================================
# NEW: Subsystem disables — inherited from rv32_defconfig,
# all have zero hardware in BenVM. Saves boot probing time,
# reduces kernel .text/.data/.bss size, and frees RAM.
# ============================================================

# --- Virtualization (no H extension) ---
CONFIG_VIRTUALIZATION=n
CONFIG_KVM=n

# --- PCI/IOMMU (no bus) ---
CONFIG_PCI=n
CONFIG_IOMMU_SUPPORT=n

# --- HugeTLB (pointless on 24MB) ---
CONFIG_HUGETLBFS=n
CONFIG_HUGETLB_PAGE=n

# --- Thermal/Power (no thermal zones) ---
CONFIG_THERMAL=n
CONFIG_PM=n
CONFIG_SUSPEND=n
CONFIG_HIBERNATION=n

# --- VGA arbiter (no display) ---
CONFIG_VGA_ARB=n

# --- CPU idle (emulator handles WFI) ---
CONFIG_CPU_IDLE=n

# --- DMA engine (no DMA hardware) ---
CONFIG_DMADEVICES=n
CONFIG_DMA_ENGINE=n

# --- GPIO/Pinctrl (no GPIO hardware) ---
CONFIG_PINCTRL=n
CONFIG_GPIOLIB=n

# --- Memory management overhead ---
CONFIG_MEMORY_HOTPLUG=n
CONFIG_COMPACTION=n
CONFIG_MIGRATION=n
CONFIG_CMA=n
CONFIG_TRANSPARENT_HUGEPAGE=n

# --- Swap/cache backends (no swap device) ---
CONFIG_CLEANCACHE=n
CONFIG_FRONTSWAP=n
CONFIG_ZSWAP=n
CONFIG_ZPOOL=n

# --- VirtIO (no devices yet — re-enable for Phase 3) ---
CONFIG_VIRTIO=n
CONFIG_VIRTIO_MENU=n
CONFIG_VHOST_MENU=n

# --- Bus drivers (no I2C/SPI/HID hardware) ---
CONFIG_HID=n
CONFIG_I2C=n
CONFIG_SPI=n

# --- Hardware monitors (no hardware) ---
CONFIG_RTC_CLASS=n
CONFIG_WATCHDOG=n
CONFIG_HWMON=n

# --- Flash/media/framebuffer (no hardware) ---
CONFIG_MTD=n
CONFIG_MEDIA_SUPPORT=n
CONFIG_FB=n

# --- Misc hardware (no LEDs/EDAC/regulators) ---
CONFIG_NEW_LEDS=n
CONFIG_EDAC=n
CONFIG_REGULATOR=n
CONFIG_POWER_SUPPLY=n
CONFIG_BACKLIGHT_CLASS_DEVICE=n
CONFIG_LOGO=n

# --- Legacy buses (no PCMCIA/RapidIO/parallel) ---
CONFIG_PCCARD=n
CONFIG_RAPIDIO=n
CONFIG_ACCESSIBILITY=n
CONFIG_AUXDISPLAY=n
CONFIG_PARPORT=n
CONFIG_GNSS=n

# --- Device tree overlays (not needed) ---
CONFIG_OF_OVERLAY=n

# --- Precision time protocol (no PTP hardware) ---
CONFIG_PPS=n
CONFIG_PTP_1588_CLOCK=n

# --- Page table test suite (debug overhead) ---
CONFIG_DEBUG_VM_PGTABLE=n

# --- Workqueue watchdog (false positives on slow emulator) ---
# At 700K IPS, real-time seconds pass much faster than guest CPU time.
# The kernel's workqueue watchdog sees 50+ seconds elapsed and thinks
# tasks are stuck, spamming "BUG: workqueue lockup" warnings.
# CONFIG_WQ_WATCHDOG is not set

# --- RCU: use single-CPU implementation ---
CONFIG_TINY_RCU=y

# ============================================================
# Keep: Essential for BusyBox userspace
# ============================================================
CONFIG_PRINTK=y
CONFIG_PRINTK_TIME=y
CONFIG_EARLY_PRINTK=y
CONFIG_PROC_FS=y
CONFIG_SYSFS=y
CONFIG_TMPFS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_MULTIUSER=y
